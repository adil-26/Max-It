<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Candidate growth visual</title>
  <desc id="desc">Illustrative career growth chart with profile and milestones.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#eff3ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="90" y="90" width="1420" height="820" rx="34" fill="url(#card)" stroke="#d3d3d3" stroke-width="2"/>
  <circle cx="360" cy="350" r="170" fill="#dbe4fe"/>
  <circle cx="360" cy="300" r="70" fill="#3961f8"/>
  <rect x="250" y="390" width="220" height="170" rx="85" fill="#1d268b"/>
  <rect x="560" y="230" width="860" height="440" rx="26" fill="#ffffff" stroke="#d3d3d3"/>
