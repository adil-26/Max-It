<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Finance sector technology visual</title>
  <desc id="desc">Abstract city and chart motif representing finance technology staffing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161a55"/>
      <stop offset="100%" stop-color="#1d268b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="120" y="120" width="1360" height="760" rx="30" fill="#0f1437" stroke="#5e8afc" stroke-width="2"/>
  <polyline points="220,720 360,650 520,670 650,580 820,590 980,500 1120,520 1300,430 1400,450" fill="none" stroke="#ff9293" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="240" y="340" width="80" height="380" fill="#5e8afc" opacity="0.45"/>
  <rect x="360" y="280" width="80" height="440" fill="#5e8afc" opacity="0.45"/>
  <rect x="480" y="370" width="80" height="350" fill="#5e8afc" opacity="0.45"/>
  <rect x="600" y="250" width="80" height="470" fill="#5e8afc" opacity="0.45"/>
  <rect x="720" y="320" width="80" height="400" fill="#5e8afc" opacity="0.45"/>
  <rect x="840" y="210" width="80" height="510" fill="#5e8afc" opacity="0.45"/>
  <text x="220" y="240" fill="#eff3ff" font-family="Arial, sans-serif" font-size="52" font-weight="700">FINANCE TECHNOLOGY DELIVERY</text>
  <text x="220" y="292" fill="#bed0ff" font-family="Arial, sans-serif" font-size="30">Regulatory workflows, secure systems, and data-sensitive operations</text>
